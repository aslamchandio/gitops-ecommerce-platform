name: Terraform Destroy

# DANGEROUS — destroys every GCP resource in the terraform state.
# Type DESTROY-PROD-IT into the input to actually run.
# The 5 destroy blockers (LB cleanup grace, SQL ABANDON, peering
# cleanup, kubernetes provider try() fallbacks) are mitigated in code,
# so a single-pass destroy is expected.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DESTROY-PROD-IT to confirm (case-sensitive, irreversible)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.PROJECT_ID }}

jobs:
  destroy:
    runs-on: ubuntu-latest
    # Recommended: gate behind a GitHub Environment with required-reviewer rule.
    # environment: production-destroy
    if: ${{ inputs.confirm == 'DESTROY-PROD-IT' }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-tf-runner
        with:
          wif_provider:    ${{ secrets.GCP_WIF_TF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_TF_ACCOUNT }}
          project_id:      ${{ vars.PROJECT_ID }}

      # Same stub-key trick as terraform-plan — destroy doesn't push the key
      # anywhere, but file() needs to resolve before the destroy graph builds.
      - name: Stub ArgoCD deploy key
        run: ssh-keygen -t ed25519 -C ci-destroy-stub -f infrastructure/terraform/.argocd-deploy-key -N "" -q

      - name: terraform init + destroy
        working-directory: infrastructure/terraform
        env:
          TF_VAR_project_id:                 ${{ vars.PROJECT_ID }}
          TF_VAR_master_authorized_networks: '[]'
        # -refresh=false skips the plan-time refresh that would otherwise
        # have kubernetes_manifest resources phone the GKE API for CRD
        # schema validation. From a GitHub-hosted runner that's a guaranteed
        # timeout against a private cluster master, and it blocks the entire
        # destroy graph even when the manifest itself isn't in state. State
        # accuracy isn't a concern here — we want to delete everything.
        run: |
          terraform init    -input=false -lock-timeout=180s
          terraform destroy -input=false -auto-approve -refresh=false -lock-timeout=600s

      - name: Post-destroy sanity check
        if: always()
        run: |
          set +e
          echo "---REMAINING GKE CLUSTERS---"
          gcloud container clusters list 2>&1 | head -5
          echo "---REMAINING CLOUD SQL---"
          gcloud sql instances list 2>&1 | head -5
          echo "---REMAINING REDIS---"
          gcloud redis instances list --region=us-central1 2>&1 | head -5
          echo "---REMAINING VPC---"
          gcloud compute networks list 2>&1 | head -5
