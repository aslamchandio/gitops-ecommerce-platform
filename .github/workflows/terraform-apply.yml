name: Terraform Apply

# Manual dispatch only — type APPLY into the input to actually run.
# Two-step bootstrap: -target=cluster + helm first so kubernetes_manifest
# can plan, then full apply.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type APPLY to confirm (case-sensitive)'
        required: true
        type: string
      target_only:
        description: 'Run ONLY the targeted bootstrap (cluster + helm) — skip step 2'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.PROJECT_ID }}

jobs:
  apply:
    runs-on: ubuntu-latest
    # Optional: gate behind a GitHub Environment with required-reviewer rule.
    # environment: production
    if: ${{ inputs.confirm == 'APPLY' }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-tf-runner
        with:
          wif_provider:    ${{ secrets.GCP_WIF_TF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_TF_ACCOUNT }}
          project_id:      ${{ vars.PROJECT_ID }}

      # Real deploy key written from secret. argocd_application.tf reads it
      # via file() and stores it in a K8s Secret so ArgoCD can pull from the
      # gitops repo. Generate the secret with:
      #   gh secret set ARGOCD_DEPLOY_KEY_PRIVATE < infrastructure/terraform/.argocd-deploy-key
      - name: Materialize ArgoCD deploy key
        env:
          KEY: ${{ secrets.ARGOCD_DEPLOY_KEY_PRIVATE }}
        run: |
          set -euo pipefail
          if [[ -z "${KEY:-}" ]]; then
            echo "::error::ARGOCD_DEPLOY_KEY_PRIVATE secret is empty"
            exit 1
          fi
          umask 077
          printf '%s\n' "$KEY" > infrastructure/terraform/.argocd-deploy-key
          ssh-keygen -l -f infrastructure/terraform/.argocd-deploy-key

      - name: terraform init
        working-directory: infrastructure/terraform
        run: terraform init -input=false -lock-timeout=180s

      # Step 1: bring up cluster + ArgoCD so kubernetes_manifest can plan.
      - name: terraform apply (step 1 — bootstrap)
        working-directory: infrastructure/terraform
        env:
          TF_VAR_project_id:                 ${{ vars.PROJECT_ID }}
          TF_VAR_master_authorized_networks: '[]'
        run: |
          terraform apply -input=false -auto-approve -lock-timeout=300s \
            -target=google_container_cluster.primary \
            -target=google_container_node_pool.system \
            -target=helm_release.argocd

      # Step 2: full apply (skip if target_only=true).
      - name: terraform apply (step 2 — full)
        if: ${{ inputs.target_only != true }}
        working-directory: infrastructure/terraform
        env:
          TF_VAR_project_id:                 ${{ vars.PROJECT_ID }}
          TF_VAR_master_authorized_networks: '[]'
        run: terraform apply -input=false -auto-approve -lock-timeout=300s

      - name: terraform output
        if: always()
        working-directory: infrastructure/terraform
        run: terraform output -no-color || true
