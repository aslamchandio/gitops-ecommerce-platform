name: CI - Build, Push & Bump Manifests

# CI (this workflow): on a `v*` tag push, build ALL 5 microservices, push their
#                     images to Artifact Registry tagged with the git tag (e.g.
#                     v3), then rewrite k8s/*.yaml image refs on `main` and
#                     commit them.
# CD (ArgoCD):        watches `main:k8s/` and syncs the new tags to GKE.
#
# Release flow:
#   git tag v3 && git push origin v3
# Or trigger manually from the Actions tab with the tag input.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to build & deploy (e.g. v3)'
        required: true
        type: string

env:
  # PROJECT_ID is sourced from a repository Variable (Settings → Secrets and
  # variables → Actions → Variables). Not a secret — project IDs aren't
  # sensitive and showing them unmasked in logs is fine. Edit from the UI
  # without a commit. REGION could be moved the same way if needed.
  PROJECT_ID: ${{ vars.PROJECT_ID }}
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/${{ vars.PROJECT_ID }}/ecom-microservices

permissions:
  contents: write   # bump-manifests commits back to main
  id-token: write   # Workload Identity Federation -> GCP

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build + push all five service images in parallel, tagged with the release
  # ---------------------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        svc: [catalog-service, cart-service, checkout-service, order-service, ui-service]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag + short SHA
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          # Short SHA (first 7 chars) is what manifests pin to — immutable,
          # always changes per commit, so ArgoCD's diff can never silently
          # miss an image bump.
          echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      # GitHub's runner-side codeload infra has been returning 404 for the
      # google-github-actions/* action archives (@v2 and @v3 both, on
      # multiple reruns over hours). Replaced both with a manual WIF
      # exchange — same security model (still WIF, still repo-scoped
      # OIDC, still no JSON keys), zero dependency on GitHub Actions
      # action downloads. The runner image already has curl, jq, and
      # gcloud preinstalled.
      - name: Authenticate to GCP (manual WIF exchange)
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
          SA_EMAIL:     ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          # 1. GitHub OIDC token for this workflow run
          OIDC=$(curl -sH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://iam.googleapis.com/${WIF_PROVIDER}" \
            | jq -r .value)
          # 2. Exchange via STS for a federated token (still pool-scoped)
          FED=$(curl -sX POST "https://sts.googleapis.com/v1/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "audience=https://iam.googleapis.com/${WIF_PROVIDER}" \
            --data-urlencode "grantType=urn:ietf:params:oauth:grant-type:token-exchange" \
            --data-urlencode "requestedTokenType=urn:ietf:params:oauth:token-type:access_token" \
            --data-urlencode "scope=https://www.googleapis.com/auth/cloud-platform" \
            --data-urlencode "subjectTokenType=urn:ietf:params:oauth:token-type:jwt" \
            --data-urlencode "subjectToken=${OIDC}" \
            | jq -r .access_token)
          # 3. Impersonate the service account to get a real SA access token
          ACCESS=$(curl -sX POST \
            "https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/${SA_EMAIL}:generateAccessToken" \
            -H "Authorization: Bearer ${FED}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{"scope":["https://www.googleapis.com/auth/cloud-platform"]}' \
            | jq -r .accessToken)
          # Mask in logs and stash for the docker-login step
          echo "::add-mask::${ACCESS}"
          echo "GCP_ACCESS_TOKEN=${ACCESS}" >> "$GITHUB_ENV"

      - name: Configure docker for Artifact Registry
        run: |
          echo "$GCP_ACCESS_TOKEN" \
            | docker login -u oauth2accesstoken --password-stdin \
              "${{ env.REGION }}-docker.pkg.dev"

      # Buildx and build-push were docker/setup-buildx-action@v3 and
      # docker/build-push-action@v6, but codeload.github.com keeps 404'ing
      # third-party action downloads on this runner (same outage that hit
      # google-github-actions/* above). Replaced with native shell calls;
      # `docker buildx` is preinstalled on ubuntu-latest. Cache moved from
      # type=gha (needs vars that only build-push-action exposes) to
      # type=registry, stored alongside the image in Artifact Registry.
      - name: Set up Buildx (native)
        run: |
          set -euo pipefail
          docker buildx create --name ci --use
          docker buildx inspect --bootstrap

      - name: Build & push ${{ matrix.svc }}
        env:
          IMAGE_BASE: ${{ env.REGISTRY }}/${{ matrix.svc }}
          TAG_VALUE:  ${{ steps.tag.outputs.value }}
          TAG_SHA:    ${{ steps.tag.outputs.sha }}
        run: |
          set -euo pipefail
          # GIT_SHA is honored by the ui-service Dockerfile to populate
          # APP_VERSION, which the running app uses as ?v=<sha> on its
          # static asset links so browsers refetch on every release.
          # Other service Dockerfiles ignore the unknown arg, which is safe.
          #
          # Three tags per image:
          #   - vN: human-readable release marker (browsable in the registry)
          #   - <sha>: immutable digest-equivalent, used by k8s manifests
          #   - latest: convenience for ad-hoc pulls; never referenced by k8s
          docker buildx build \
            --push \
            --build-arg GIT_SHA="${TAG_SHA}" \
            --tag "${IMAGE_BASE}:${TAG_VALUE}" \
            --tag "${IMAGE_BASE}:${TAG_SHA}" \
            --tag "${IMAGE_BASE}:latest" \
            --cache-from "type=registry,ref=${IMAGE_BASE}:buildcache" \
            --cache-to   "type=registry,ref=${IMAGE_BASE}:buildcache,mode=max" \
            ./services/${{ matrix.svc }}

      # ----- Cache-Control regression test (ui-service only) -----
      # Runs the freshly-pushed image and asserts the headers are present.
      # Any PR that breaks WebMvcConfig.java fails CI here before ship.
      - name: Verify Cache-Control headers on ui-service image
        if: matrix.svc == 'ui-service'
        run: |
          set -euo pipefail
          IMG="${{ env.REGISTRY }}/${{ matrix.svc }}:${{ steps.tag.outputs.sha }}"
          docker pull "$IMG"
          docker run -d --rm --name ui-verify -p 18080:8080 \
            -e CATALOG_SERVICE_URL=http://stub:8081 \
            -e CART_SERVICE_URL=http://stub:8082 \
            -e CHECKOUT_SERVICE_URL=http://stub:8083 \
            "$IMG"
          # Wait up to 60s for the actuator readiness endpoint
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:18080/actuator/health/readiness >/dev/null 2>&1; then
              echo "ui-service ready"; break
            fi
            sleep 2
          done

          fail() {
            echo "::error::$1"
            docker logs ui-verify | tail -30 || true
            docker stop ui-verify >/dev/null 2>&1 || true
            exit 1
          }

          html_cc=$(curl -sS -I http://localhost:18080/ | tr -d '\r' | grep -i '^cache-control:' || true)
          echo "HTML: $html_cc"
          echo "$html_cc" | grep -qi 'no-cache' || fail "HTML response missing Cache-Control: no-cache"

          css_cc=$(curl -sS -I http://localhost:18080/css/styles.css | tr -d '\r' | grep -i '^cache-control:' || true)
          echo "CSS:  $css_cc"
          echo "$css_cc" | grep -qi 'immutable' || fail "CSS response missing Cache-Control: immutable"

          # The ?v=<sha> cache-bust query must be present in rendered HTML.
          page=$(curl -sS http://localhost:18080/ || true)
          echo "$page" | grep -q "styles.css?v=${{ steps.tag.outputs.sha }}" \
            || fail "Rendered HTML missing styles.css?v=<sha> cache-bust query"

          echo "All cache-control regression checks passed"
          docker stop ui-verify >/dev/null

  # ---------------------------------------------------------------------------
  # 2. Bump image tags on main; ArgoCD will pick this commit up and sync to GKE
  # ---------------------------------------------------------------------------
  bump-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main                     # commit goes onto main, not the tag commit
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release tag + short SHA
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          # We pin manifests to the SHA of the *tagged* commit, not main's
          # HEAD (which may have advanced). github.sha here is the commit
          # that the v* tag points at.
          echo "sha=$(echo "${{ github.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Rewrite image tags in k8s/*.yaml to short SHA
        env:
          SHA: ${{ steps.tag.outputs.sha }}
        run: |
          set -euo pipefail
          for svc in catalog-service cart-service checkout-service order-service ui-service; do
            # Find the manifest that references this service's image.
            file=$(grep -lE "image:[[:space:]]+${REGISTRY}/${svc}:" k8s/*.yaml || true)
            if [[ -z "$file" ]]; then
              echo "WARN: no manifest references ${svc} — skipping"
              continue
            fi
            sed -i -E "s|(image:[[:space:]]+${REGISTRY}/${svc}):[^[:space:]]+|\1:${SHA}|" "$file"
            echo "▶ ${file}: ${svc} -> ${SHA}"
          done

      - name: Commit & push to main
        run: |
          if git diff --quiet -- k8s/; then
            echo "Manifests already pinned to ${{ steps.tag.outputs.sha }} — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git commit -m "ci: bump image refs to ${{ steps.tag.outputs.value }} (${{ steps.tag.outputs.sha }})"
          git push origin main
