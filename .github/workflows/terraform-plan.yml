name: Terraform Plan

# Posts the plan as a PR comment on any change to infrastructure/terraform/**.
# Also runnable manually for ad-hoc drift checks.
#
# Read-only — `terraform plan` never mutates. The kubernetes_manifest resource
# in argocd_application.tf requires a live cluster at plan time; until the
# first apply has run, the plan body is correct but the run ends with
# "cannot create REST client" — expected, not a regression.

on:
  pull_request:
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/terraform-*.yml'
      - '.github/actions/setup-tf-runner/**'
  workflow_dispatch:

permissions:
  contents:      read
  id-token:      write   # WIF
  pull-requests: write   # post plan comment

env:
  PROJECT_ID: ${{ vars.PROJECT_ID }}

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-tf-runner
        with:
          wif_provider:    ${{ secrets.GCP_WIF_TF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_TF_ACCOUNT }}
          project_id:      ${{ vars.PROJECT_ID }}

      # Throwaway key so terraform's file() reference in argocd_application.tf
      # resolves at plan time. Plan only diffs; the value is sensitive and
      # never written anywhere real.
      - name: Stub ArgoCD deploy key (plan only)
        run: ssh-keygen -t ed25519 -C ci-plan-stub -f infrastructure/terraform/.argocd-deploy-key -N "" -q

      - name: terraform init + plan
        id: plan
        working-directory: infrastructure/terraform
        continue-on-error: true   # keep going so we can comment on errors
        env:
          TF_VAR_project_id:                 ${{ vars.PROJECT_ID }}
          TF_VAR_master_authorized_networks: '[]'
        run: |
          set -o pipefail
          terraform init  -input=false -lock-timeout=120s
          terraform plan  -input=false -lock-timeout=120s -no-color 2>&1 | tee /tmp/plan.txt

      # Skip on workflow_dispatch (no PR to comment on)
      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO:      ${{ github.repository }}
        run: |
          set -euo pipefail
          BODY="## Terraform Plan
          \`\`\`
          $(head -c 58000 /tmp/plan.txt)
          \`\`\`"
          jq -nc --arg body "$BODY" '{body: $body}' > /tmp/comment.json
          curl -sfL -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d @/tmp/comment.json \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" >/dev/null

      - name: Fail the check if plan errored
        if: steps.plan.outcome == 'failure'
        run: |
          echo "::error::terraform plan failed — see logs / PR comment"
          exit 1
