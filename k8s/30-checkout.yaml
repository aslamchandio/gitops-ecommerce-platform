apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-service
  namespace: ecom
  labels:
    app: checkout-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout-service
  template:
    metadata:
      labels:
        app: checkout-service
    spec:
      nodeSelector:
        cloud.google.com/compute-class: ecom-spot
      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      terminationGracePeriodSeconds: 25
      # Spread the 2+ replicas across different nodes and zones so a single
      # Spot preemption can't take the service to zero. See 70-hpa.yaml.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: checkout-service
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: checkout-service
      containers:
        - name: checkout
          image: us-central1-docker.pkg.dev/terraform-project-883456/ecom-microservices/checkout-service:2b40f8b
          ports:
            - containerPort: 8083
          env:
            - name: PORT
              value: "8083"
            - name: CART_SERVICE_URL
              value: "http://cart-service:8082"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8084"
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 192Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 15
---
# Cluster-internal only — ui-service reaches it via in-cluster DNS
# (`http://checkout-service:8083`). Not exposed to the internet.
apiVersion: v1
kind: Service
metadata:
  name: checkout-service
  namespace: ecom
spec:
  type: ClusterIP
  selector:
    app: checkout-service
  ports:
    - port: 8083
      targetPort: 8083
