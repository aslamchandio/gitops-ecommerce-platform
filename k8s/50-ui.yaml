apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-service
  namespace: ecom
  labels: { app: ui-service }
spec:
  # HPA (k8s/70-hpa.yaml) manages replicas from 1→3 based on CPU.
  # Setting an explicit value here just defines initial state at first apply.
  replicas: 1
  selector:
    matchLabels: { app: ui-service }
  template:
    metadata:
      labels: { app: ui-service }
    spec:
      nodeSelector:
        cloud.google.com/compute-class: ecom-spot
      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      terminationGracePeriodSeconds: 25
      # Spread UI pods across zones so a single zonal Spot reclamation
      # never takes the whole frontend down.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: { app: ui-service }
      containers:
        - name: ui
          image: IMAGE_UI
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: CATALOG_SERVICE_URL
              value: "http://catalog-service:8081"
            - name: CART_SERVICE_URL
              value: "http://cart-service:8082"
            - name: CHECKOUT_SERVICE_URL
              value: "http://checkout-service:8083"
          resources:
            requests: { cpu: 200m, memory: 384Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 30
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: ui-service
  namespace: ecom
  annotations:
    # Gateway controller creates a standalone NEG automatically when an HTTPRoute
    # targets this Service. Explicit annotation is harmless and aids debugging.
    cloud.google.com/neg: '{"exposed_ports": {"80": {"name": "ui-service-neg"}}}'
spec:
  selector: { app: ui-service }
  ports:
    - port: 80
      targetPort: 8080
      appProtocol: HTTP  # hint for the LB health check
  type: ClusterIP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ui-service
  namespace: ecom
spec:
  maxUnavailable: 1
  selector:
    matchLabels: { app: ui-service }
