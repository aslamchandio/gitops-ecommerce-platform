# HorizontalPodAutoscaler for each microservice.
#
# All services scale on CPU utilization against the pod's request (not limit).
# Target 70% — gives ~30% headroom for traffic spikes before saturating.
#
# minReplicas=1 keeps cost low at idle (and matches PDB maxUnavailable=1 — at
# 1 replica a Spot eviction still drops to 0 briefly; that's an accepted cost
# of running everything on Spot at min size).
#
# Scaling behavior uses HPA v2 defaults:
#   - scale-up: immediate (0s stabilization)
#   - scale-down: 5min stabilization (prevents flapping during traffic dips)

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: catalog-service
  namespace: ecom
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: catalog-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
