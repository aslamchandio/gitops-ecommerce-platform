# HorizontalPodAutoscaler for each microservice.
#
# All services scale on CPU utilization against the pod's request (not limit).
# Target 70% — gives ~30% headroom for traffic spikes before saturating.
#
# minReplicas=2 because we run on Spot VMs: any single node can be preempted
# at any time with ~30s notice. With minReplicas=1 the load balancer briefly
# reports "no healthy upstream" while NAP provisions a new node and the
# single pod warms up (~60s). At minReplicas=2 (combined with the
# topologySpreadConstraints on each Deployment that spreads pods by zone
# AND hostname) a single Spot eviction never takes the service to zero.
# Cost delta vs minReplicas=1: ~$3–5/mo per service on e2 Spot.
#
# Scaling behavior uses HPA v2 defaults:
#   - scale-up: immediate (0s stabilization)
#   - scale-down: 5min stabilization (prevents flapping during traffic dips)

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: catalog-service
  namespace: ecom
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: catalog-service
  minReplicas: 2
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
