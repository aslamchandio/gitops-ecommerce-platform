# Public entry point via Kubernetes Gateway API.
#
# `gke-l7-global-external-managed` provisions a global external HTTP(S)
# load balancer (Premium Tier). TLS termination uses a Google Cloud
# Certificate Manager certificate, referenced via a CertificateMap.
#
# Listeners:
#   - http  (port 80)  → only accepts the redirect HTTPRoute below
#   - https (port 443) → real traffic; cert from `ecom-certmap` (annotation)
#
# Routes:
#   - ui-route          : shop.nativeops.site over HTTPS → ui-service
#   - http-to-https     : any HTTP request → 301 to https://shop.nativeops.site
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ecom-gateway
  namespace: ecom
  annotations:
    # CertificateMap (managed by terraform in cert_map.tf) named "my-certificate"
    # binds shop.nativeops.site → the Cert Manager certificate also named
    # "my-certificate". The Gateway controller looks up the map by this name
    # and wires the cert into the LB target proxy.
    # NOTE: this annotation takes a Certificate MAP name, NOT a certificate
    # name. The map and cert sharing the name is intentional.
    networking.gke.io/certmap: my-certificate
spec:
  gatewayClassName: gke-l7-global-external-managed
  # Pin to a reserved global IP. Managed by terraform in gateway_ip.tf.
  addresses:
    # Name must match the prefixed google_compute_global_address.gateway in
    # infrastructure/terraform/gateway_ip.tf — i.e. <local.name>-<var.gateway_address_name>.
    - type: NamedAddress
      value: it-prod-ecom-ip
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      # NO `tls:` block on purpose. The GKE Gateway controller resolves the
      # cert via the `networking.gke.io/certmap` annotation above. Adding a
      # `tls:` block here triggers the upstream Gateway API CRD validation
      # rule (`certificateRefs or options required when mode is Terminate`),
      # which is incompatible with the certmap-only pattern on GKE.
      allowedRoutes:
        namespaces:
          from: Same

---
# Real user traffic: HTTPS on shop.nativeops.site → ui-service:80
#
# Cache-Control is enforced at the gateway as a backstop to the same headers
# emitted by ui-service (see WebMvcConfig.java). Belt-and-suspenders: if the
# app ever stops setting them, the GLB still does — so a v* deploy is
# instantly visible to all users without browser cache tricks.
#
# Rules are matched longest-prefix-first by the Gateway API spec, so /css/
# and /js/ win over the / catchall for those URLs.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ui-route
  namespace: ecom
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ecom-gateway
      sectionName: https    # only binds to the HTTPS listener
  hostnames:
    - shop.nativeops.site
  rules:
    # Hashed static assets: cache for a year. Safe — the ?v={sha} query the
    # app appends means every deploy produces a new URL, naturally bypassing
    # any cache entry from the prior release.
    - matches:
        - path:
            type: PathPrefix
            value: /css/
        - path:
            type: PathPrefix
            value: /js/
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Cache-Control
                value: "max-age=31536000, public, immutable"
      backendRefs:
        - group: ""
          kind: Service
          name: ui-service
          port: 80
          weight: 1
    # Everything else (HTML pages): force revalidation. Without this,
    # browsers heuristically cache HTML for hours and users miss deploys.
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Cache-Control
                value: "no-cache, no-store, must-revalidate"
              - name: Pragma
                value: "no-cache"
              - name: Expires
                value: "0"
      backendRefs:
        - group: ""
          kind: Service
          name: ui-service
          port: 80
          weight: 1

---
# Redirect everything else (HTTP on port 80) to HTTPS. Browsers + curl
# follow 301s, so the user's experience is "always HTTPS".
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https
  namespace: ecom
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ecom-gateway
      sectionName: http     # only binds to the HTTP listener
  rules:
    # Explicit `matches` block: the Gateway API CRD defaults this to
    # [{ path: { type: PathPrefix, value: "/" } }] when omitted, which the
    # API server writes onto the stored object. ArgoCD then sees the live
    # object has a field git doesn't and reports OutOfSync forever. Spell
    # it out here so git matches the defaulted live state.
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---
# Tell the Google Cloud Load Balancer to health-check the Spring Boot
# actuator endpoint instead of GET / (which can be slow or return non-200
# during warm-up). HealthCheckPolicy is a GKE Gateway extension.
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: ui-service-hc
  namespace: ecom
spec:
  default:
    config:
      type: HTTP
      httpHealthCheck:
        port: 8080
        requestPath: /actuator/health/readiness
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 3
  targetRef:
    group: ""
    kind: Service
    name: ui-service
