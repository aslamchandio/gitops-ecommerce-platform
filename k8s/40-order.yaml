apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecom
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      nodeSelector:
        cloud.google.com/compute-class: ecom-spot
      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      terminationGracePeriodSeconds: 25
      serviceAccountName: ecom-workload
      volumes:
        - name: gsm
          csi:
            driver: secrets-store-gke.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: ecom-db-password
      # Spread the 2+ replicas across different nodes and zones so a single
      # Spot preemption can't take the service to zero. See 70-hpa.yaml.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: order-service
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: order-service
      containers:
        - name: order
          image: us-central1-docker.pkg.dev/terraform-project-883456/ecom-microservices/order-service:46b483c
          ports:
            - containerPort: 8084
          volumeMounts:
            - name: gsm
              mountPath: /var/secrets
              readOnly: true
          # Read the password from the CSI-mounted file at startup and pass it
          # to Spring Boot as an env var. The shell wrapper avoids any code
          # change to the Spring app while keeping the secret out of K8s API.
          command: ["/bin/sh", "-c"]
          args:
            - 'export SPRING_DATASOURCE_PASSWORD="$(cat /var/secrets/db-password)" && exec java -XX:MaxRAMPercentage=75 -jar /app/app.jar'
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: ecom-db-config
                  key: JDBC_ORDERS_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: ecom-db-config
                  key: DB_USER
            - name: SERVER_PORT
              value: "8084"
            # Cap HikariCP pool at 5 per pod. Cloud SQL db-f1-micro has a
            # tight connection budget (~50 max); with minReplicas=2 the
            # default pool of 10 per pod would consume 20 connections from
            # this service alone and exhaust Postgres on a scale event.
            - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              value: "5"
            - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
              value: "1"
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: ecom
spec:
  selector:
    app: order-service
  ports:
    - port: 8084
      targetPort: 8084
