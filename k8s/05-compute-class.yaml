# ComputeClass tells GKE Node Auto-Provisioning what kind of nodes to create
# when a pod that selects this class is unschedulable.
#
# Priority list is tried top-down:
#   1. Spot e2 nodes  (cheapest — ~70% discount, evictable with 25s notice)
#   2. Spot n2 nodes  (fallback if e2 spot is exhausted)
#   3. On-demand e2  (last resort — guarantees pods schedule)
#
# Each priority pins disk + zones explicitly so the manifest is self-contained
# (these were previously inherited silently from terraform NAP defaults).
#
# Disk:  pd-standard 50 GiB — cheapest persistent boot disk type. Container
#        images and ephemeral storage share this disk; 50 GiB is comfortable
#        for the 5-service image footprint (~2 GiB total) plus headroom.
#
# Zones: us-central1-{b,c,f} — the 3 zones of the regional cluster. Listing
#        all three lets NAP pick whichever zone currently has Spot capacity
#        and keeps topologySpreadConstraints (zone) viable across nodes.
#
# Pods opt in by setting:
#   nodeSelector:
#     cloud.google.com/compute-class: ecom-spot
#   tolerations:
#     - key: cloud.google.com/gke-spot
#       operator: Equal
#       value: "true"
#       effect: NoSchedule
apiVersion: cloud.google.com/v1
kind: ComputeClass
metadata:
  name: ecom-spot
spec:
  priorities:
    - machineFamily: e2
      spot: true
      storage:
        bootDiskType: pd-standard
        bootDiskSize: 50
      location:
        zones:
          - us-central1-b
          - us-central1-c
          - us-central1-f
    - machineFamily: n2
      spot: true
      storage:
        bootDiskType: pd-standard
        bootDiskSize: 50
      location:
        zones:
          - us-central1-b
          - us-central1-c
          - us-central1-f
    - machineFamily: e2
      spot: false  # on-demand fallback
      storage:
        bootDiskType: pd-standard
        bootDiskSize: 50
      location:
        zones:
          - us-central1-b
          - us-central1-c
          - us-central1-f
  nodePoolAutoCreation:
    enabled: true
  # If demand outstrips all listed priorities, scale up anyway with whatever
  # NAP can find (rather than leaving the pod pending).
  whenUnsatisfiable: ScaleUpAnyway
  # Periodically rebalance pods back to higher-priority nodes when capacity
  # returns (e.g. move from on-demand back to spot).
  activeMigration:
    optimizeRulePriority: true
