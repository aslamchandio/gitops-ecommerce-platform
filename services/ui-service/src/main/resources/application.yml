server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ui-service
  thymeleaf:
    cache: false  # set true in prod via -Dspring.thymeleaf.cache=true

catalog:
  service:
    url: ${CATALOG_SERVICE_URL:http://localhost:8081}
cart:
  service:
    url: ${CART_SERVICE_URL:http://localhost:8082}
checkout:
  service:
    url: ${CHECKOUT_SERVICE_URL:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
