<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title th:text="${title}">Nova Store</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Apply persisted theme BEFORE first paint to avoid flash-of-wrong-theme. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('nova-theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = saved || (prefersDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
      })();
    </script>
</head>
<body>

<!-- ============================ SIDEBAR ============================ -->
<aside th:fragment="sidebar(active)" class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <a class="brand-link" th:href="@{/}">
            <span class="brand-mark">◆</span>
            <span class="brand-name">NOVA</span>
        </a>
        <button type="button" class="sidebar-close" aria-label="Close menu" data-sidebar-close>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
    </div>

    <nav class="sidebar-nav" aria-label="Primary">
        <p class="sidebar-section">Shop</p>
        <a th:href="@{/}" class="side-link" th:classappend="${active == 'home'} ? ' is-active' : ''">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
            <span>Dashboard</span>
        </a>
        <a href="/#products" class="side-link" th:classappend="${active == 'shop'} ? ' is-active' : ''">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18l-1.5 12.5A2 2 0 0 1 17.5 21h-11A2 2 0 0 1 4.5 19.5z"/><path d="M8 7V5a4 4 0 0 1 8 0v2"/></svg>
            <span>All Products</span>
        </a>
        <a href="#categories" class="side-link" th:classappend="${active == 'categories'} ? ' is-active' : ''">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            <span>Categories</span>
        </a>

        <p class="sidebar-section">Account</p>
        <a th:href="@{/cart}" class="side-link" th:classappend="${active == 'cart'} ? ' is-active' : ''">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
            <span>My Cart</span>
        </a>
        <a th:href="@{/checkout}" class="side-link" th:classappend="${active == 'checkout'} ? ' is-active' : ''">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/><path d="M8 3v3M16 3v3"/></svg>
            <span>Checkout</span>
        </a>
    </nav>

    <div class="sidebar-foot">
        <div class="sidebar-card">
            <p class="sidebar-card-title">Free shipping</p>
            <p class="sidebar-card-sub">On orders over $50</p>
        </div>
    </div>
</aside>

<!-- ============================ TOPBAR ============================ -->
<header th:fragment="topbar(cartCount, pageTitle)" class="topbar">
    <button type="button" class="topbar-menu" aria-label="Open menu" data-sidebar-open>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>

    <div class="topbar-title">
        <h1 th:text="${pageTitle}">Dashboard</h1>
    </div>

    <div class="topbar-search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
        </svg>
        <input type="search" id="product-search" placeholder="Search products…"
               aria-label="Search products" autocomplete="off">
        <kbd class="search-hint">/</kbd>
    </div>

    <div class="topbar-actions">
        <button type="button" class="icon-btn" id="theme-toggle" aria-label="Toggle theme">
            <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
            </svg>
            <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
            </svg>
        </button>
        <a th:href="@{/cart}" class="icon-btn cart-link" aria-label="View cart">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/>
            </svg>
            <span class="cart-badge" th:if="${cartCount != null and cartCount > 0}"
                  th:text="${cartCount}">0</span>
        </a>
    </div>
</header>

<!-- Scrim shown when sidebar is open on mobile -->
<div th:fragment="scrim" class="sidebar-scrim" data-sidebar-close></div>

<footer th:fragment="footer" class="app-footer">
    <span>© 2026 Nova Store</span>
    <span class="dot">·</span>
    <span>Microservices on GKE</span>
    <span class="dot">·</span>
    <a href="#" class="muted">Privacy</a>
    <a href="#" class="muted">Terms</a>
</footer>

</body>
</html>
