<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title th:text="${title}">Nova Store</title>
    <link rel="stylesheet" th:href="@{/css/styles.css(v=${appVersion})}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- Apply persisted theme BEFORE first paint to avoid flash-of-wrong-theme.
         On localhost (Docker Desktop dev) default to dark so the local env feels
         distinct from prod and reflects the user's stated preference. Saved
         choice always wins. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('nova-theme');
          var host = location.hostname;
          var isLocal = host === 'localhost' || host === '127.0.0.1' || host.endsWith('.local');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = saved || (isLocal ? 'dark' : (prefersDark ? 'dark' : 'light'));
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
      })();
    </script>
</head>
<body>

<!-- ============ AMBIENT GRADIENT ORBS (decorative background) ============ -->
<div th:fragment="orbs" class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grain"></div>
</div>

<!-- ============ TOP NAV ============ -->
<nav th:fragment="nav(cartCount, active)" class="topnav">
    <div class="nav-inner">
        <a class="brand" th:href="@{/}">
            <span class="brand-mark">◆</span>
            <span class="brand-name">NOVA</span>
        </a>

        <div class="nav-links" id="nav-links">
            <a th:href="@{/}" th:classappend="${active == 'home'} ? ' is-active' : ''">Shop</a>
            <a href="/#categories" th:classappend="${active == 'categories'} ? ' is-active' : ''">Categories</a>
            <a href="/#featured" th:classappend="${active == 'featured'} ? ' is-active' : ''">New In</a>
            <a th:href="@{/cart}" th:classappend="${active == 'cart'} ? ' is-active' : ''">Cart</a>
        </div>

        <div class="nav-search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
            </svg>
            <input type="search" id="product-search" placeholder="Search products…"
                   aria-label="Search products" autocomplete="off">
            <kbd class="kbd">/</kbd>
        </div>

        <div class="nav-actions">
            <button type="button" class="icon-btn" id="theme-toggle" aria-label="Toggle theme">
                <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                </svg>
                <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
                </svg>
            </button>
            <a th:href="@{/cart}" class="icon-btn cart-link" aria-label="View cart">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/>
                </svg>
                <span class="cart-badge" th:if="${cartCount != null and cartCount > 0}"
                      th:text="${cartCount}">0</span>
            </a>
            <button type="button" class="icon-btn nav-burger" id="nav-burger" aria-label="Toggle menu">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18M3 12h18M3 18h18"/>
                </svg>
            </button>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="site-footer">
    <div class="footer-inner">
        <div class="footer-brand">
            <span class="brand-mark">◆</span> NOVA
            <p>The curated marketplace for everyday essentials and standout finds.</p>
        </div>
        <div class="footer-col">
            <h4>Shop</h4>
            <a th:href="@{/}">All products</a>
            <a href="/#categories">Categories</a>
            <a href="/#featured">New arrivals</a>
        </div>
        <div class="footer-col">
            <h4>Help</h4>
            <a href="#">Shipping &amp; returns</a>
            <a href="#">Order status</a>
            <a href="#">Contact</a>
        </div>
        <div class="footer-col">
            <h4>Company</h4>
            <a href="#">About</a>
            <a href="#">Careers</a>
            <a href="#">Privacy</a>
        </div>
    </div>
    <div class="footer-bottom">© 2026 Nova Store · Microservices on GKE</div>
</footer>

</body>
</html>
